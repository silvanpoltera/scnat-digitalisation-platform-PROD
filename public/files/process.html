    <script>
    (function(){
      function sync(){try{var b=parent.document.documentElement.classList.contains('theme-bright');document.documentElement.classList.toggle('theme-bright',b)}catch(e){}}
      sync();
      try{new MutationObserver(sync).observe(parent.document.documentElement,{attributes:true,attributeFilter:['class']})}catch(e){}
    })();
    </script>

    <script>
        // Test if data is loaded
        window.addEventListener('load', function() {
            console.log('Page loaded, checking processData...');

                console.log('✓ Items:', processData.items ? processData.items.length : 'nicht verfügbar');

                console.error('✗ processData NICHT gefunden!');
            }
        });
    </script>

<script>
(function(){
