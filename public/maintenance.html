<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111316">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<title>SCNAT · Update läuft</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;
    min-height:100dvh;
    display:flex;align-items:center;justify-content:center;
    background:#111316;color:#E8E9EB;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{text-align:center;padding:2rem;max-width:360px;width:100%}
  .logo-ring{width:80px;height:80px;margin:0 auto 2rem;position:relative}
  .logo-ring img{width:56px;height:56px;position:absolute;top:12px;left:12px;border-radius:50%}
  .logo-ring::before{content:'';position:absolute;inset:0;border-radius:50%;border:2.5px solid transparent;border-top-color:#EA515A;border-right-color:#EA515A;animation:spin 1.2s linear infinite}
  .logo-ring::after{content:'';position:absolute;inset:6px;border-radius:50%;border:2px solid transparent;border-bottom-color:#0098DA;border-left-color:#0098DA;animation:spin 1.8s linear infinite reverse}
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-size:1.15rem;font-weight:600;margin-bottom:.5rem;letter-spacing:.02em}
  p{font-size:.85rem;color:#8B8F96;line-height:1.6}
  .dots{margin-top:1.5rem;display:flex;gap:6px;justify-content:center}
  .dots span{width:5px;height:5px;border-radius:50%;background:#EA515A;animation:pulse 1.4s ease-in-out infinite}
  .dots span:nth-child(2){animation-delay:.2s}
  .dots span:nth-child(3){animation-delay:.4s}
  @keyframes pulse{0%,80%,100%{opacity:.25;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
  .mono{font-family:'SF Mono',Menlo,monospace;font-size:.65rem;color:#4E535D;margin-top:2rem;letter-spacing:.08em;text-transform:uppercase}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-ring">
    <img src="/scnat-icon.png" alt="SCNAT">
  </div>
  <h1>Wir sind gerade an der Arbeit</h1>
  <p>Die Plattform wird aktualisiert und ist in wenigen Minuten wieder verfügbar.</p>
  <div class="dots"><span></span><span></span><span></span></div>
  <div class="mono">Deployment in progress</div>
</div>
<script>
setInterval(function(){
  fetch('/api/auth/me',{method:'GET',cache:'no-store'})
    .then(function(r){ if(r.ok || r.status === 401) window.location.reload(); })
    .catch(function(){});
}, 10000);
</script>
</body>
</html>
